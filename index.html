<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- הגדרות קריטיות למסך מלא באייפון -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DJ etamarAI">
    
    <!-- אייקון למסך הבית -->
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3659/3659791.png">
    
    <title>DJ @etamarAI</title>

    <style>
        :root { 
            --red: #ff3b30; --green: #34c759; --blue: #007aff; --bg: #000000; --card: #1c1c1e; 
        }

        /* מניעת כל סוג של גלילה או בחירת טקסט כדי להרגיש אפליקציה */
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            user-select: none; 
            -webkit-user-select: none;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: var(--bg); color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* המכולה הראשית שתופסת את כל המסך */
        .app-wrapper {
            display: flex; flex-direction: column;
            height: 100dvh; /* גובה דינמי למובייל */
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* נגן קבוע למעלה */
        .player-section {
            flex-shrink: 0; background: #000;
        }
        #player-wrapper { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; }
        #progress-container { position: absolute; bottom: 0; left: 0; width: 100%; height: 4px; background: #333; }
        #progress-bar { width: 0%; height: 100%; background: var(--green); transition: width 0.5s linear; }

        /* טקסט רץ DJ @etamarAI - מהירות איטית 16s */
        .marquee-bar {
            background: #1c1c1e; padding: 12px 0; overflow: hidden; white-space: nowrap; border-bottom: 1px solid #333;
        }
        .marquee-inner {
            display: inline-block; font-size: 1.2rem; font-weight: 800; color: var(--blue);
            animation: marquee 16s linear infinite; padding-right: 50px;
        }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* כפתורי שליטה - גדולים למגע אצבע */
        .controls {
            padding: 15px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; background: var(--bg);
        }
        .btn {
            border: none; border-radius: 14px; padding: 18px 5px; font-weight: bold; font-size: 1rem; color: white;
            display: flex; align-items: center; justify-content: center; transition: opacity 0.1s;
        }
        .btn:active { opacity: 0.6; }
        .btn-play { background: var(--green); grid-column: span 3; font-size: 1.2rem; margin-bottom: 5px; }
        .btn-pause { background: #ffcc00; color: #000; }
        .btn-skip { background: var(--blue); }
        .btn-stop { background: var(--red); }

        /* אזור רשימות גולל */
        .content-scroll {
            flex: 1; overflow-y: auto; padding: 15px;
            background: linear-gradient(to bottom, #121212, #000);
            /* מניעת מתיחה של הדף למעלה (Bounce) */
            overscroll-behavior: contain;
        }

        /* טופס */
        details { background: var(--card); border-radius: 16px; padding: 15px; margin-bottom: 20px; border: 1px solid #2c2c2e; }
        summary { cursor: pointer; color: var(--red); font-weight: bold; font-size: 1.1rem; list-style: none; }
        .form { display: flex; flex-direction: column; gap: 12px; margin-top: 15px; }
        .input-row { display: flex; gap: 10px; }
        input { background: #2c2c2e; color: #fff; border: none; padding: 16px; border-radius: 12px; font-size: 16px; width: 100%; }

        /* Stepper זמן משופר */
        .stepper-box { display: flex; align-items: center; background: #2c2c2e; border-radius: 12px; height: 55px; overflow: hidden; flex: 1; }
        .stepper-box button { background: #3a3a3c; border: none; color: white; width: 50px; height: 100%; font-size: 1.5rem; }
        .stepper-box input { background: transparent; text-align: center; padding: 0; font-family: monospace; font-size: 1.3rem; }

        /* עיצוב שירים */
        h3 { font-size: 0.9rem; color: #8e8e93; text-transform: uppercase; margin: 25px 0 10px 0; letter-spacing: 1px; }
        .song-card { 
            background: var(--card); margin-bottom: 12px; padding: 16px; border-radius: 18px; 
            display: flex; flex-direction: column; gap: 12px;
        }
        .song-card.active { background: #2c2c2e; border: 1px solid var(--green); box-shadow: 0 0 15px rgba(52, 199, 89, 0.2); }
        
        .song-info { display: flex; align-items: center; gap: 12px; }
        .song-info b { font-size: 1.1rem; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
        .genre-badge { font-size: 0.7rem; background: var(--blue); padding: 2px 6px; border-radius: 5px; vertical-align: middle; margin-right: 5px; }

        .card-actions { display: flex; gap: 8px; }
        .card-actions button { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: bold; font-size: 0.8rem; color: white; }
        .btn-mini-play { background: var(--green); }
        .btn-mini-del { background: #3a3a3c; }

        /* חיפוש */
        .search-bar { position: sticky; top: 0; z-index: 50; padding-bottom: 10px; background: transparent; }
        .search-bar input { background: #1c1c1e; border: 1px solid #333; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        /* הסתרת סקרול בר */
        .content-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <!-- קבוע למעלה -->
        <div class="player-section">
            <div id="player-wrapper">
                <div id="main-player"></div>
                <div id="progress-container"><div id="progress-bar"></div></div>
            </div>
            
            <div class="marquee-bar">
                <div class="marquee-inner">DJ @etamarAI • DJ @etamarAI • DJ @etamarAI • DJ @etamarAI • DJ @etamarAI</div>
            </div>

            <div class="controls">
                <button class="btn btn-play" onclick="startSession()">▶ הפעל סשן DJ</button>
                <button class="btn btn-pause" id="pauseBtn" onclick="togglePause()">⏸</button>
                <button class="btn btn-skip" onclick="skipTrack()">⏭</button>
                <button class="btn btn-stop" onclick="stopEverything()">⏹</button>
            </div>
        </div>

        <!-- נגלל -->
        <div class="content-scroll">
            <details id="formDetails">
                <summary>➕ הוספת שיר חדש</summary>
                <div class="form">
                    <input type="hidden" id="editUid">
                    <input type="text" id="inUrl" placeholder="לינק מיוטיוב">
                    <div class="input-row">
                        <input type="text" id="inArtist" placeholder="אמן">
                        <input type="text" id="inGenre" placeholder="ז'אנר">
                    </div>
                    <input type="text" id="inTitle" placeholder="שם השיר">
                    <div class="input-row">
                        <div class="stepper-box">
                            <button onclick="step('inStart', -1)">-</button>
                            <input type="text" id="inStart" value="000" readonly>
                            <button onclick="step('inStart', 1)">+</button>
                        </div>
                        <div class="stepper-box">
                            <button onclick="step('inEnd', -1)">-</button>
                            <input type="text" id="inEnd" value="000" readonly>
                            <button onclick="step('inEnd', 1)">+</button>
                        </div>
                    </div>
                    <button class="btn" style="background:var(--red); width:100%;" onclick="saveSong()">שמור למאגר</button>
                </div>
            </details>

            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="🔍 חיפוש במחסנית..." oninput="render()">
            </div>

            <h3>🔥 הסשן שלך</h3>
            <div id="activeContainer"></div>

            <h3>📦 כל המאגר</h3>
            <div id="libraryContainer"></div>
        </div>
    </div>

<script>
    let player;
    let songs = JSON.parse(localStorage.getItem('dj_v5_final')) || [];
    let currentPlayingUid = null;
    let monitorInterval;

    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('main-player', {
            height: '100%', width: '100%',
            playerVars: { 'autoplay': 0, 'controls': 1, 'playsinline': 1, 'rel': 0, 'modestbranding': 1 },
            events: { 'onStateChange': onPlayerStateChange, 'onReady': () => render() }
        });
    }

    function step(id, val) {
        const el = document.getElementById(id);
        let current = parseInt(el.value);
        current = Math.max(0, current + val);
        el.value = current.toString().padStart(3, '0');
    }

    function saveSong() {
        const uid = document.getElementById('editUid').value || Date.now().toString();
        const url = document.getElementById('inUrl').value;
        const idMatch = url.match(/(?:v=|\/)([0-9A-Za-z_-]{11})/);
        if (!idMatch) return alert("לינק לא תקין");

        const songData = {
            uid: uid, id: idMatch[1], 
            artist: document.getElementById('inArtist').value || "Unknown",
            title: document.getElementById('inTitle').value || "New Track",
            genre: document.getElementById('inGenre').value || "",
            start: parseInt(document.getElementById('inStart').value),
            end: parseInt(document.getElementById('inEnd').value) || null,
            selected: true 
        };

        const idx = songs.findIndex(s => s.uid === uid);
        if (idx > -1) songs[idx] = songData; else songs.push(songData);
        localStorage.setItem('dj_v5_final', JSON.stringify(songs));
        resetForm(); render();
    }

    function render() {
        const activeContainer = document.getElementById('activeContainer');
        const libraryContainer = document.getElementById('libraryContainer');
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        activeContainer.innerHTML = ""; libraryContainer.innerHTML = "";
        
        songs.forEach((s) => {
            const matchesSearch = s.artist.toLowerCase().includes(searchTerm) || s.title.toLowerCase().includes(searchTerm) || s.genre.toLowerCase().includes(searchTerm);
            const html = `
                <div class="song-card ${s.uid === currentPlayingUid ? 'active' : ''}">
                    <div class="song-info">
                        <input type="checkbox" ${s.selected ? 'checked' : ''} onchange="toggleSelect('${s.uid}')" style="width:22px;height:22px;">
                        <b>${s.artist} - ${s.title}</b>
                    </div>
                    <div style="font-size:0.8rem; color:#8e8e93;">
                        ${s.genre ? `<span class="genre-badge">${s.genre}</span>` : ''} 
                        ⏱ ${s.start}s ➔ ${s.end || 'סוף'}
                    </div>
                    <div class="card-actions">
                        <button class="btn-mini-play" onclick="playTrack('${s.uid}')">PLAY NOW</button>
                        <button class="btn-mini-del" onclick="removeSong('${s.uid}')">DELETE</button>
                    </div>
                </div>
            `;
            if (s.selected) activeContainer.innerHTML += html;
            else if (matchesSearch) libraryContainer.innerHTML += html;
        });
    }

    function toggleSelect(uid) {
        const s = songs.find(x => x.uid === uid);
        s.selected = !s.selected;
        localStorage.setItem('dj_v5_final', JSON.stringify(songs));
        render();
    }

    function removeSong(uid) {
        if(confirm("למחוק?")) {
            songs = songs.filter(s => s.uid !== uid);
            localStorage.setItem('dj_songs_vfinal', JSON.stringify(songs));
            render();
        }
    }

    function resetForm() {
        document.getElementById('editUid').value = "";
        document.querySelectorAll('.form input').forEach(i => i.value = (i.id.includes('Start') ? "000" : ""));
        document.getElementById('formDetails').open = false;
    }

    function playTrack(uid) {
        const s = songs.find(x => x.uid === uid);
        if (!s) return;
        currentPlayingUid = uid; render();
        player.loadVideoById({ videoId: s.id, startSeconds: s.start });
        startMonitor(s);
    }

    function startMonitor(s) {
        clearInterval(monitorInterval);
        const bar = document.getElementById('progress-bar');
        monitorInterval = setInterval(() => {
            const now = player.getCurrentTime();
            const dur = s.end || player.getDuration();
            if (dur > 0) {
                const pct = ((now - s.start) / (dur - s.start)) * 100;
                bar.style.width = Math.min(pct, 100) + "%";
            }
            if (s.end && now >= s.end) skipTrack();
        }, 500);
    }

    function onPlayerStateChange(e) { if (e.data === YT.PlayerState.ENDED) skipTrack(); }

    function skipTrack() {
        const selected = songs.filter(s => s.selected);
        const idx = selected.findIndex(s => s.uid === currentPlayingUid);
        if (idx > -1 && idx < selected.length - 1) playTrack(selected[idx + 1].uid);
    }

    function startSession() {
        const selected = songs.filter(s => s.selected);
        if (selected.length > 0) playTrack(selected[0].uid);
    }

    function togglePause() {
        const state = player.getPlayerState();
        if (state === 1) player.pauseVideo(); else player.playVideo();
    }

    function stopEverything() {
        clearInterval(monitorInterval); player.stopVideo(); 
        currentPlayingUid = null; render();
        document.getElementById('progress-bar').style.width = "0%";
    }
</script>

</body>
</html>
